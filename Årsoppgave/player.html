<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Player Information</title>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html">Players</a>
            <a href="stats.html">Stats</a>
            <a href="#">Read</a>
        </nav>
    </header>
    <br>

    <div class="container">
        <h1>Player Information</h1>
        <form id="playerForm">
            <label for="firstName">Firstname:</label>
            <input type="text" id="firstNameInput" required>

            <label for="lastName">Lastname:</label>
            <input type="text" id="lastNameInput" required>

            <label for="jerseyNumber">Jersey Nr:</label>
            <input type="number" id="jerseyNumberInput" required>

            <label for="country">Country:</label>
            <input type="text" id="countryInput" required>

            <label for="height">Height:</label>
            <input type="number" id="heightInput" required>

            <label for="weight">Weight:</label>
            <input type="number" id="weightInput" required>

            <label for="year">Year:</label>
            <input type="number" id="yearInput" required>

            <label for="fatigue">Fatigue:</label>
            <input type="text" id="fatigueInput" required>

            <button type="button" onclick="addPlayer()">Add Player</button>
        </form>
    </div>

    <div class="container">
        <div id="playerInformation">
            <h2>Player Information:</h2>
            <p id="firstName">Firstname:</p>
            <p id="lastName">Lastname:</p>
            <p id="jerseyNumber">Jersey Nr:</p>
            <p id="country">Country:</p>
            <p id="height">Height:</p>
            <p id="weight">Weight:</p>
            <p id="year">Year:</p>
            <p id="fatigue">Fatigue:</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
