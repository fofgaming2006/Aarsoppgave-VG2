<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Basketball Player Stats</title>
</head>

<body>

    <header class="header">
        <nav class="navbar">
            <a href="index.html">Players</a>
            <a href="stats.html">Stats</a>
            <a href="#">Read</a>
        </nav>
    </header>

    <div class="container">
        <div id="playerInformation">
            <h2>Player Information:</h2>
            <p id="firstName">Firstname:</p>
            <p id="lastName">Lastname:</p>
            <p id="jerseyNumber">Jersey Nr:</p>
            <p id="country">Country:</p>
            <p id="height">Height:</p>
            <p id="weight">Weight:</p>
            <p id="year">Year:</p>
            <p id="fatigue">Fatigue:</p>
        </div>
    </div>

    <div class="container">
        <div id="averageStats">
            <h2>Average Statistics</h2>
            <p id="avgPoints">Average Points: 0</p>
            <p id="avgAssists">Average Assists: 0</p>
            <p id="avgRebounds">Average Rebounds: 0</p>
            <p id="avgSteals">Average Steals: 0</p>
            <p id="avgBlocks">Average Blocks: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
